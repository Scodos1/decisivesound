{% load static %}
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

<style>
  .portal-messages { max-width: 640px; margin: 0 auto 20px; }
  .portal-message { padding: 12px 18px; border-radius: var(--r-md); font-size: 14px; margin-bottom: 10px; }
  .portal-message.success { background: rgba(26,127,55,0.15); color: #6bd48a; border: 1px solid rgba(26,127,55,0.35); }
  .portal-message.error { background: rgba(207,34,34,0.12); color: #ff8080; border: 1px solid rgba(207,34,34,0.35); }
  .portal-message.info, .portal-message.warning { background: rgba(184,134,11,0.12); color: #e0ac3f; border: 1px solid rgba(184,134,11,0.35); }
  .auth-card { max-width: 440px; margin: 0 auto; }
  .helper-link { font-size: 13px; color: var(--on-surface-variant); text-align: center; margin-top: 18px; }
  .helper-link a { color: var(--secondary); font-weight: 600; }
</style>
